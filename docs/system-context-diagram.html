<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>ReadEase — System Context Diagram</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
  </style>
</head>
<body>

<svg width="920" height="580" viewBox="0 0 920 580"
     xmlns="http://www.w3.org/2000/svg"
     font-family="'Segoe UI', Arial, sans-serif">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#333"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════
       NODES
  ══════════════════════════════════ -->

  <!-- Children (top-left) -->
  <rect x="30" y="35" width="130" height="48" rx="4"
        fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="95" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Children</text>

  <!-- AI System (top-right) -->
  <rect x="600" y="35" width="130" height="48" rx="4"
        fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="665" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#333">AI System</text>

  <!-- ReadEase (center) -->
  <ellipse cx="390" cy="260" rx="100" ry="52"
           fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="390" y="266" text-anchor="middle" font-size="16" font-weight="700" fill="#333">ReadEase</text>

  <!-- Clinician (bottom-left) -->
  <rect x="30" y="440" width="130" height="48" rx="4"
        fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="95" y="470" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Clinician</text>

  <!-- Guardian (bottom-right) -->
  <rect x="600" y="440" width="130" height="48" rx="4"
        fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="665" y="470" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Guardian</text>


  <!-- ══════════════════════════════════
       Children ↔ ReadEase
       One arrow each direction, labels stacked beside
  ══════════════════════════════════ -->

  <!-- ReadEase → Children -->
  <path d="M300,222 L142,83" fill="none"
        stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Children → ReadEase -->
  <path d="M155,83 L310,228" fill="none"
        stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Labels (left side, clear of lines) -->
  <text x="105" y="132" font-size="10" fill="#333">Read contents</text>
  <text x="105" y="170" font-size="10" fill="#333">Send mouse trajectory data</text>


  <!-- ══════════════════════════════════
       ReadEase ↔ AI System
       One arrow each direction, labels stacked beside
  ══════════════════════════════════ -->

  <!-- ReadEase → AI System -->
  <path d="M470,222 L612,83" fill="none"
        stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- AI System → ReadEase -->
  <path d="M625,83 L480,216" fill="none"
        stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Labels (right of arrows) -->
  <text x="605" y="118" font-size="10" fill="#333">Lexical simplification requests</text>
  <text x="605" y="143" font-size="10" fill="#333">Sends weekly reading metrics</text>
  <text x="605" y="168" font-size="10" fill="#333">Returns progress report</text>


  <!-- ══════════════════════════════════
       Clinician ↔ ReadEase
       One arrow each direction, labels stacked beside
  ══════════════════════════════════ -->

  <!-- Clinician → ReadEase -->
  <path d="M155,440 L300,300" fill="none"
        stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ReadEase → Clinician -->
  <path d="M293,305 L148,446" fill="none"
        stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Labels (left side, clear of lines) -->
  <text x="75" y="345" font-size="10" fill="#333">Manages reading content</text>
  <text x="75" y="375" font-size="10" fill="#333">Views reading heatmaps</text>
  <text x="75" y="405" font-size="10" fill="#333">Views session analytics</text>


  <!-- ══════════════════════════════════
       Guardian ↔ ReadEase
       One arrow each direction, labels stacked beside
  ══════════════════════════════════ -->

  <!-- Guardian → ReadEase -->
  <path d="M608,440 L492,305" fill="none"
        stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ReadEase → Guardian -->
  <path d="M497,312 L615,446" fill="none"
        stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Labels (right of arrows) -->
  <text x="600" y="345" font-size="10" fill="#333">Views weekly reports</text>
  <text x="600" y="375" font-size="10" fill="#333">Provides COPPA consent</text>
  <text x="600" y="405" font-size="10" fill="#333">Manages child profile</text>


  <!-- ══════════════════════════════════
       LEGEND
  ══════════════════════════════════ -->

  <rect x="220" y="525" width="36" height="20" rx="3"
        fill="#fff" stroke="#333" stroke-width="1.3"/>
  <text x="268" y="540" font-size="11" fill="#333">Actor</text>

  <line x1="320" y1="535" x2="355" y2="535"
        stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="370" y="540" font-size="11" fill="#333">Interaction</text>

  <ellipse cx="480" cy="535" rx="22" ry="12"
           fill="#fff" stroke="#333" stroke-width="1.3"/>
  <text x="515" y="540" font-size="11" fill="#333">Main system</text>

</svg>
</body>
</html>

name: ReadEase CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Test & Lint (Backend + ML-Service)
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend Tests ──
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        run: cd backend && npm ci

      - name: Lint Backend
        run: cd backend && npm run lint

      - name: Run Backend Unit Tests
        run: cd backend && npm test

      # ── ML-Service Tests ──
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: ml-service/requirements.txt

      - name: Install ML Dependencies
        run: cd ml-service && pip install -r requirements.txt

      - name: Run ML-Service Tests
        run: cd ml-service && python -m pytest --tb=short

  # ──────────────────────────────────────────────
  # Stage 2: Deploy to VPS (only on push to main)
  # ──────────────────────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH || '/opt/readease' }}

            # Pull latest code
            git pull origin main

            # Rebuild and restart containers
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            # Run database migrations inside the api container
            docker exec readease_api node -e "
              const ds = require('./src/database/data-source.js');
              ds.initialize().then(d => d.runMigrations().then(() => {
                console.log('Migrations completed');
                process.exit(0);
              })).catch(e => { console.error(e); process.exit(1); });
            "

            # Verify health
            sleep 10
            curl -f http://localhost:3000/api/v1/health || exit 1
            echo "✅ Deploy successful!"
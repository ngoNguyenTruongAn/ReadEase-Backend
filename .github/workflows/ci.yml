name: ReadEase CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Run backend unit tests
        working-directory: backend
        run: npm test -- --runInBand

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ml-service/requirements.txt

      - name: Install ML dependencies
        working-directory: ml-service
        run: pip install -r requirements.txt

      - name: Run ML service tests
        working-directory: ml-service
        run: python -m pytest --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: readease-production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ap-southeast-1
      ECS_CLUSTER: readease-demo-cluster
      ECS_SERVICE: readease-demo-backend
      TASK_FAMILY: readease-demo-backend
      APPLICATION_URL: http://readease-demo-alb-1388515170.ap-southeast-1.elb.amazonaws.com
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials with GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::193229476041:role/readease-demo-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push immutable images
        id: images
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          BACKEND_IMAGE="$REGISTRY/readease-demo-backend:${GITHUB_SHA}"
          ML_IMAGE="$REGISTRY/readease-demo-ml:${GITHUB_SHA}"

          docker build -t "$BACKEND_IMAGE" ./backend
          docker push "$BACKEND_IMAGE"

          docker build -t "$ML_IMAGE" ./ml-service
          docker push "$ML_IMAGE"

          echo "backend=$BACKEND_IMAGE" >> "$GITHUB_OUTPUT"
          echo "ml=$ML_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Register a new backend task definition
        id: task-definition
        env:
          BACKEND_IMAGE: ${{ steps.images.outputs.backend }}
          ML_IMAGE: ${{ steps.images.outputs.ml }}
        run: |
          aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query taskDefinition > current-task-definition.json

          jq --arg backend "$BACKEND_IMAGE" --arg ml "$ML_IMAGE" '
            .containerDefinitions |= map(
              if .name == "backend" then .image = $backend
              elif .name == "ml" then .image = $ml
              else . end
            )
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy,
                .deregisteredAt
              )
          ' current-task-definition.json > next-task-definition.json

          TASK_DEFINITION_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://next-task-definition.json \
            --query taskDefinition.taskDefinitionArn \
            --output text)
          echo "arn=$TASK_DEFINITION_ARN" >> "$GITHUB_OUTPUT"

      - name: Run database migrations
        env:
          TASK_DEFINITION_ARN: ${{ steps.task-definition.outputs.arn }}
        run: |
          NETWORK_CONFIGURATION=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].networkConfiguration' \
            --output json)

          MIGRATION_TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --launch-type FARGATE \
            --task-definition "$TASK_DEFINITION_ARN" \
            --network-configuration "$NETWORK_CONFIGURATION" \
            --overrides '{"containerOverrides":[{"name":"backend","command":["npm","run","migration:run"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)

          test "$MIGRATION_TASK_ARN" != "None"
          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$MIGRATION_TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$MIGRATION_TASK_ARN" \
            --query "tasks[0].containers[?name=='backend'].exitCode | [0]" \
            --output text)
          test "$EXIT_CODE" = "0"

      - name: Deploy backend service
        env:
          TASK_DEFINITION_ARN: ${{ steps.task-definition.outputs.arn }}
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$TASK_DEFINITION_ARN" \
            --force-new-deployment > /dev/null

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"

      - name: Verify deployment
        run: |
          curl --fail --silent --show-error \
            --retry 12 --retry-delay 5 \
            "$APPLICATION_URL/api/v1/health"
